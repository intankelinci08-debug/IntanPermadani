<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Operator Aritmatika
        // penjumlahan
        // pengurangan
        // perkalian
        // pembagian
        
        let a = 10;
        let b = 5;

        let hasil = a + b;
        let hasil2 = a - b;
        let hasil3 = a * b;
        let hasil4 = a / b;

        document.write("hasil penjumlahan : " + hasil + "<br>");
        document.write("hasil pengurangan : " + hasil2 + "<br>");
        document.write("hasil perkalian : " + hasil3 + "<br>");
        document.write("hasil pembagian : " + hasil4 + "<br>");
    </script>
</body>
</html>
