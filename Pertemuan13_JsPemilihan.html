<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Pemilihan</title>
</head>
<body>
    <script>
        // Contoh pemilihan [cite: 223]
        let nilai = 80; // [cite: 224]

        if (nilai >= 90) { // [cite: 225]
            console.log("Nilai A"); // [cite: 226]
            document.write("Nilai A"); // [cite: 226]
        } else if (nilai >= 80) { // [cite: 227]
            console.log("Nilai B"); // [cite: 227]
            document.write("Nilai B"); // [cite: 227]
        } else if (nilai >= 70) { // [cite: 228]
            console.log("Nilai C"); // [cite: 228]
            document.write("Nilai C"); // [cite: 228]
        } else if (nilai >= 60) { // [cite: 229]
            console.log("Nilai D"); // [cite: 229]
            document.write("Nilai D"); // [cite: 229]
        } else { // [cite: 230]
            console.log("Nilai E"); // [cite: 232]
            document.write("Nilai E"); // [cite: 233]
        }
    </script>
</body>
</html>
