<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Function</title>
</head>
<body>
    <script>
        // 1. Fungsi Penjumlahan [cite: 209]
        function tambah(a, b) {
            return a + b;
        }
        console.log("Hasil penjumlahan: " + tambah(5, 3)); // Output: 8 [cite: 209]

        // 2. Fungsi Menyapa [cite: 210, 211]
        function sapa(nama) {
            console.log("Halo, " + nama + "!");
        }
        sapa("Alice"); // Output: Halo, Alice! [cite: 210]
        sapa("Bob");   // Output: Halo, Bob! [cite: 211]
    </script>
</body>
</html>
