<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Contoh array number dan string
        let arrayNumber = [1, 2, 3, 4, 5];
        let arrayString = ["satu", "dua", "tiga", "empat", "lima"];
        
        // Contoh gabungan array number dan string
        let arrayGabungan = [1, "satu", 2, "dua", 3, "tiga"];

        // Buat output melalui console log
        console.log("Array Number", arrayNumber);
        console.log("Array String", arrayString);
        console.log("Array Gabungan", arrayGabungan);

        // TAMPILKAN PER INDEX KE 2 DARI ARRAY NUMBER
        console.log("Index ke 2 dari Array Number:", arrayNumber[2]); // Menampilkan angka 3

        // Tampilkan dengan looping array index
        console.log("Looping Array Number: ");
        for (let i = 0; i < arrayNumber.length; i++) {
            console.log(arrayNumber[i]);
        }
    </script>
</body>
</html>
