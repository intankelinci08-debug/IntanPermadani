<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Kelulusan Mahasiswa</title>
    <script>
        function cekKelulusan() {
            // Ambil nilai dari input form
            const nilai = document.getElementById("nilai").value;

            // Validasi input: Apakah nilai kosong?
            if (nilai === "") {
                alert("Silakan masukkan nilai!");
                return;
            }

            // Konversi nilai string dari input ke angka (float)
            const nilaiAngka = parseFloat(nilai);

            // Cek kondisi kelulusan berdasarkan nilaiAngka
            if (nilaiAngka >= 60) {
                document.getElementById("hasil").innerText = "Selamat! Anda Lulus.";
            } else {
                document.getElementById("hasil").innerText = "Maaf, Anda Tidak Lulus.";
            }
        }
    </script>
</head>
<body>

    <h1>Program Kelulusan Mahasiswa</h1>
    
    <form onsubmit="return false;">
        <label for="nilai">Masukkan Nilai:</label>
        <input type="number" id="nilai" placeholder="Contoh: 75">
        <button type="button" onclick="cekKelulusan()">Cek Kelulusan</button>
    </form>

    <p id="hasil" style="font-weight: bold; font-size: 1.2em; margin-top: 15px;"></p>

</body>
</html>
