<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function dan Array</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        .section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        input, button {
            margin: 5px 0;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Program Function dan Array</h1>

        <div class="section">
            <h2>Kalkulator</h2>
            <input type="number" id="angka1" placeholder="Masukkan angka pertama">
            <input type="number" id="angka2" placeholder="Masukkan angka kedua">
            <input type="text" id="operator" placeholder="Masukkan operator (+, -, *, /)">
            <button onclick="hitungkalkulator()">Hitung</button>
            <p>Hasil: <span id="hasilkalkulator" style="font-weight: bold;"></span></p>
        </div>

        <div class="section">
            <h2>Perhitungan Persegi Panjang</h2>
            <input type="number" id="panjang" placeholder="Masukkan panjang">
            <input type="number" id="lebar" placeholder="Masukkan lebar">
            <button onclick="hitungPersegi()">Hitung</button>
            <p>Luas: <span id="luas" style="font-weight: bold;"></span></p>
            <p>Keliling: <span id="keliling" style="font-weight: bold;"></span></p>
        </div>

        <div class="section">
            <h2>Deret Aritmatika</h2>
            <input type="number" id="nilaiAwal" placeholder="Masukkan nilai awal">
            <input type="number" id="beda" placeholder="Masukkan beda">
            <input type="number" id="jumlah" placeholder="Masukkan jumlah elemen">
            <button onclick="hitungDeret()">Hitung</button>
            <p>Deret: <span id="deret" style="font-weight: bold;"></span></p>
        </div>

        <div class="section">
            <h2>Gambar Kalkulator</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Calculator_icon.svg/1200px-Calculator_icon.svg.png" alt="Gambar Kalkulator">
        </div>
    </div>

    <script>
        // 1. Fungsi Kalkulator
        function hitungkalkulator() {
            const angka1 = parseFloat(document.getElementById('angka1').value);
            const angka2 = parseFloat(document.getElementById('angka2').value);
            const operator = document.getElementById('operator').value;
            let hasil;

            switch (operator) {
                case '+':
                    hasil = angka1 + angka2;
                    break;
                case '-':
                    hasil = angka1 - angka2;
                    break;
                case '*':
                    hasil = angka1 * angka2;
                    break;
                case '/':
                    hasil = (angka2 !== 0) ? (angka1 / angka2) : "Tidak bisa membagi dengan nol";
                    break;
                default:
                    hasil = "Operator tidak valid";
            }
            document.getElementById('hasilkalkulator').innerText = hasil;
        }

        // 2. Fungsi Perhitungan Persegi Panjang
        function hitungPersegi() {
            const panjang = parseFloat(document.getElementById('panjang').value);
            const lebar = parseFloat(document.getElementById('lebar').value);

            const luas = panjang * lebar;
            const keliling = 2 * (panjang + lebar);

            document.getElementById('luas').innerText = luas;
            document.getElementById('keliling').innerText = keliling;
        }

        // 3. Fungsi Deret Aritmatika
        function hitungDeret() {
            const nilaiAwal = parseFloat(document.getElementById('nilaiAwal').value);
            const beda = parseFloat(document.getElementById('beda').value);
            const jumlah = parseInt(document.getElementById('jumlah').value);

            // Penerapan Array untuk menyimpan list deret matematika
            let deret = []; 
            
            for (let i = 0; i < jumlah; i++) {
                let nilaiElemen = nilaiAwal + (i * beda);
                deret.push(nilaiElemen);
            }

            document.getElementById('deret').innerText = deret.join(', ');
        }
    </script>

</body>
</html>
